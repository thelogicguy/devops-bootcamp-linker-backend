name: Build, Scan & Push

on:
  workflow_run:
    workflows: ["Backend CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

env:
  IMAGE_NAME: thelogicguy/devopsbootcamp-backend

jobs:
  build-scan-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.tag.outputs.full }}

    steps:
      - name: Slack — Pipeline Started
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🔨 Build Pipeline Started"
          SLACK_MESSAGE: |
            *Actor:* ${{ github.actor }}
            *Triggered by:* ${{ github.event_name }}
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Resolve build SHA
        id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          SHORT_SHA="${SHA:0:7}"
          echo "full=${SHA}" >> $GITHUB_OUTPUT
          echo "short=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Resolved SHA: ${SHA} (short: ${SHORT_SHA})"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.full }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          IMAGE_TAG="sha-${{ steps.sha.outputs.short }}"
          FULL_IMAGE="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "value=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Tagged as: ${FULL_IMAGE}"

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          provenance: false
          tags: |
            ${{ steps.tag.outputs.full }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ⚠️ Pinned to 0.35.0 — first clean release post March 2026 supply chain compromise
      # Do not upgrade without verifying. See: https://www.stepsecurity.io/blog/trivy-compromised-a-second-time
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.tag.outputs.full }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.txt
          retention-days: 30

      - name: Push image to Docker Hub
        id: push
        if: success()
        run: |
          docker push ${{ steps.tag.outputs.full }}
          docker push ${{ env.IMAGE_NAME }}:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ steps.tag.outputs.full }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Export image digest
        if: success()
        run: |
          echo "TAG=${{ steps.tag.outputs.full }}" > image-digest.txt
          echo "DIGEST=${{ steps.push.outputs.digest }}" >> image-digest.txt

      - name: Upload image digest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ github.run_id }}
          path: image-digest.txt
          retention-days: 30

      - name: Slack — Pipeline Result
        if: always()
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Docker pipeline *${{ job.status }}*
            *Image:* ${{ steps.tag.outputs.full }}
            *Digest:* ${{ steps.push.outputs.digest }}
            *Actor:* ${{ github.actor }}
            *Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}