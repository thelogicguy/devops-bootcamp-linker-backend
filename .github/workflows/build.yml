name: Build, Scan & Push

on:
  workflow_run:
    workflows: ["Backend CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

env:
  DOCKER_REPO: thelogicguy
  IMAGE_NAME: bootcamp-backend

jobs:
  build-scan-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.tag.outputs.tags }}

    steps:
      - name: Slack — Pipeline Started
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🔨 Build Pipeline Started"
          SLACK_MESSAGE: |
            *Actor:* ${{ github.actor }}
            *Triggered by:* ${{ github.event_name }}
            *Commit:* ${{ github.event.workflow_run.head_sha || github.sha }}
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ✅ workflow_run needs head_sha — github.sha points to wrong commit on this trigger
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref || github.sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-,value=${{ github.event.workflow_run.head_sha || github.sha }}
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main' }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.tag.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ⚠️ Pinned to 0.35.0 — first clean release post March 2026 supply chain compromise
      # Do not upgrade without verifying the release is clean
      # See: https://www.stepsecurity.io/blog/trivy-compromised-a-second-time
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.tag.outputs.tags }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.txt
          retention-days: 30

      - name: Push image to Docker Hub
        id: push
        if: success()
        run: |
          docker push ${{ steps.tag.outputs.tags }}
          # ✅ Capture first tag only for digest lookup — multiline tags breaks inspect
          FIRST_TAG=$(echo "${{ steps.tag.outputs.tags }}" | head -n1)
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$FIRST_TAG" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Export image digest
        if: success()
        run: |
          echo "${{ steps.push.outputs.digest }}" > image-digest.txt
          echo "IMAGE=${{ steps.tag.outputs.tags }}" >> image-digest.txt

      - name: Upload image digest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ github.run_id }}
          path: image-digest.txt
          retention-days: 30

      - name: Slack — Pipeline Result
        if: always()
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Docker pipeline *${{ job.status }}*
            *Image:* ${{ steps.tag.outputs.tags }}
            *Digest:* ${{ steps.push.outputs.digest }}
            *Actor:* ${{ github.actor }}
            *Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}