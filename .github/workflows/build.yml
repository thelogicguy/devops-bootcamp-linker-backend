name: Build, Scan & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: thelogicguy/devopsbootcamp-backend

jobs:
  build-scan-push:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.tag.outputs.full }}

    steps:
      - name: Slack — Pipeline Started
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🔨 Build Pipeline Started"
          SLACK_MESSAGE: |
            *Actor:* ${{ github.actor }}
            *Triggered by:* ${{ github.event_name }}
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tag
        id: tag
        # Using a 7-character short SHA is standard practice
        run: echo "tag_value=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Puts the image in the local docker store for Trivy to find
          push: false
          provenance: false
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag_value }}
            ${{ env.IMAGE_NAME }}:latest
          #cache-from: type=gha
          #cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          # Use the EXACT same tag you just built
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag_value }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-report.txt
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.txt
          retention-days: 30

      - name: Push image to Docker Hub
        id: push
        if: success()
        run: |
          docker push ${{ steps.tag.outputs.tag_value }}
          docker push ${{ env.IMAGE_NAME }}:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ steps.tag.outputs.full }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Export image digest
        if: success()
        run: |
          echo "TAG=${{ steps.tag.outputs.tag_value }}" > image-digest.txt
          echo "DIGEST=${{ steps.push.outputs.digest }}" >> image-digest.txt

      - name: Upload image digest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ github.run_id }}
          path: image-digest.txt
          retention-days: 30

      - name: Slack — Pipeline Result
        if: always()
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Docker pipeline *${{ job.status }}*
            *Image:* ${{ steps.tag.outputs.tag_value }}
            *Digest:* ${{ steps.push.outputs.digest }}
            *Actor:* ${{ github.actor }}
            *Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}