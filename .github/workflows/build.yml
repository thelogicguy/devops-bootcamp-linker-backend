name: Build, Scan & Push

# ✅ Fires automatically after your CI workflow passes on main
# ✅ Also supports manual dispatch with optional SHA override for hotfixes
on:
  workflow_run:
    workflows: ["Backend CI Pipeline"]               # replace with your exact CI workflow name
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

env:
  DOCKER_REPO: thelogicguy
  IMAGE_NAME: devopsbootcamp-backend
  TRIVY_VERSION: "0.51.4"          # ✅ pinned — update deliberately, not silently

jobs:
  build-scan-push:
    # ✅ For workflow_run: only proceed if CI actually passed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 20             # ✅ prevents runaway builds burning Actions minutes

    permissions:
      contents: read                # ✅ removed packages:write — not pushing to GHCR

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}   # ✅ expose digest for downstream CD
      image-tag: ${{ steps.tag.outputs.tags }}

    steps:
      - name: Slack — Pipeline Started
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🔨 Build Pipeline Started"
          SLACK_MESSAGE: |
            *Actor:* ${{ github.actor }}
            *Triggered by:* ${{ github.event_name }}
            *Branch:* ${{ github.ref_name }}
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate image tag
        run: |
          : "${TAGS:?Image tag is empty — metadata-action failed}"
          echo "Building: $TAGS"
        env:
          TAGS: ${{ steps.tag.outputs.tags }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true                # load into local daemon for scanning
          push: false
          tags: ${{ steps.tag.outputs.tags }}
          provenance: false         # ✅ explicit — avoids manifest bloat on Docker Hub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ Official action — pinned version, no curl pipe risk
      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.tag.outputs.tags }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}   # ✅ run_id suffix prevents artifact collisions
          path: trivy-report.txt
          retention-days: 30

      # ✅ Push only if scan passed — captures digest for downstream CD use
      - name: Push image to Docker Hub
        id: push
        if: success()
        run: |
          docker push ${{ steps.tag.outputs.tags }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ steps.tag.outputs.tags }} | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      # ✅ Digest artifact lets your CD pipeline deploy by immutable digest, not mutable tag
      - name: Export image digest
        if: success()
        run: |
          echo "${{ steps.push.outputs.digest }}" > image-digest.txt
          echo "IMAGE=${{ steps.tag.outputs.tags }}" >> image-digest.txt
      
      - name: Upload image digest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ github.run_id }}
          path: image-digest.txt
          retention-days: 30

      - name: Slack — Pipeline Result
        if: always()
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Docker pipeline *${{ job.status }}*
            *Image:* ${{ steps.tag.outputs.tags }}
            *Digest:* ${{ steps.push.outputs.digest }}
            *Actor:* ${{ github.actor }}
            *Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}